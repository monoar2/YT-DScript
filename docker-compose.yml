services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: ${USER_ID:-1000}:${GROUP_ID:-1000}
    ports:
      - ${JELLYFIN_PORT:-8096}:8096/tcp
      - ${JELLYFIN_CLIENT_PORT:-7359}:7359/udp
    volumes:
      - ${JELLYFIN_CONFIG_PATH}:/config
      - ${JELLYFIN_CACHE_PATH}:/cache
      - ${MEDIA_PATH}:/media:ro
      # Optional: Add transcode directory for hardware acceleration
      - ${TRANSCODE_PATH:-/tmp/jellyfin}:/transcode
    environment:
      # Optional: Set timezone (uncomment if needed)
      - TZ=${TIMEZONE:-America/Mexico_City}
      
      # Optional: Hardware acceleration variables (uncomment if needed)
      # - JELLYFIN_FFmpeg__hwaccel=${HWACCEL:-vaapi}
      # - JELLYFIN_FFmpeg__vaapiDevice=${VAAPI_DEVICE:-/dev/dri/renderD128}
      
      # Optional: Log level (default is Warning)
      # - JELLYFIN_LOG_LEVEL=${LOG_LEVEL:-Warning}
      
      # Optional: Enable debugging
      # - JELLYFIN_DEBUG=${DEBUG:-false}
      
      # Optional: Set maximum streaming bitrate (in Mbps)
      # - JELLYFIN_Playback__Streaming__MaxStreamingBitrate=${MAX_BITRATE:-120}
    restart: unless-stopped
    networks:
      - jellyfin-network
networks:
  jellyfin-network:
    driver: bridge