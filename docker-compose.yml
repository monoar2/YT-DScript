version: '3.8'

services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: ${USER_ID:-1000}:${GROUP_ID:-1000}
    ports:
      - ${JELLYFIN_PORT:-8096}:8096/tcp
      - ${JELLYFIN_CLIENT_PORT:-7359}:7359/udp
    volumes:
      - ${JELLYFIN_CONFIG_PATH}:/config
      - ${JELLYFIN_CACHE_PATH}:/cache
      - ${MEDIA_PATH}:/media:ro
      # Optional: Add transcode directory for hardware acceleration
      - ${TRANSCODE_PATH:-/tmp/jellyfin}:/transcode
    environment:
      # Optional: Set timezone (uncomment if needed)
      # - TZ=${TIMEZONE:-America/New_York}
      
      # Optional: Hardware acceleration variables (uncomment if needed)
      # - JELLYFIN_FFmpeg__hwaccel=${HWACCEL:-vaapi}
      # - JELLYFIN_FFmpeg__vaapiDevice=${VAAPI_DEVICE:-/dev/dri/renderD128}
      
      # Optional: Log level (default is Warning)
      # - JELLYFIN_LOG_LEVEL=${LOG_LEVEL:-Warning}
      
      # Optional: Enable debugging
      # - JELLYFIN_DEBUG=${DEBUG:-false}
      
      # Optional: Set maximum streaming bitrate (in Mbps)
      # - JELLYFIN_Playback__Streaming__MaxStreamingBitrate=${MAX_BITRATE:-120}
    restart: unless-stopped
    networks:
      - jellyfin-network
    # Optional: Add labels for reverse proxy or monitoring
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.yourdomain.com`)"
    #   - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

  # Optional: Add watchtower for automatic updates (uncomment if wanted)
  # watchtower:
  #   image: containrrr/watchtower
  #   container_name: watchtower
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 86400 --cleanup --label-enable
  #   restart: unless-stopped
  #   environment:
  #     - WATCHTOWER_NOTIFICATIONS=email
  #     - WATCHTOWER_NOTIFICATION_EMAIL_FROM=${WATCHTOWER_EMAIL_FROM}
  #     - WATCHTOWER_NOTIFICATION_EMAIL_TO=${WATCHTOWER_EMAIL_TO}
  #     - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=${WATCHTOWER_EMAIL_SERVER}
  #     - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=${WATCHTOWER_EMAIL_SERVER_PORT}
  #     - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=${WATCHTOWER_EMAIL_SERVER_USER}
  #     - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=${WATCHTOWER_EMAIL_SERVER_PASSWORD}

networks:
  jellyfin-network:
    driver: bridge